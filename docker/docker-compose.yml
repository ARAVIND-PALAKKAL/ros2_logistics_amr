version: '3.8'

services:
  amr_sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ros2_logistics_amr:latest
    container_name: amr_sim
    environment:
      - DISPLAY=${DISPLAY}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../maps:/ros2_ws/maps
    network_mode: host
    privileged: true
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
               source /ros2_ws/install/setup.bash &&
               ros2 launch amr_bringup amr_gazebo.launch.py"

  nav2:
    image: ros2_logistics_amr:latest
    container_name: amr_nav2
    depends_on:
      - amr_sim
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    network_mode: host
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
               source /ros2_ws/install/setup.bash &&
               sleep 10 &&
               ros2 launch amr_bringup nav2.launch.py"